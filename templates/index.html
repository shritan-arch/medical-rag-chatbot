<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical RAG Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="chat-shell">
        <section class="chat-panel">
            <header class="chat-header">
                <p class="eyebrow">Pinecone index: {{ index_name }}</p>
                <h1>Medical RAG Chatbot</h1>
            </header>

            <form method="POST" class="chat-form">
                <label for="question">Ask a medical question</label>
                <textarea
                    id="question"
                    name="question"
                    rows="4"
                    placeholder="Example: What is acne?"
                >{{ question }}</textarea>
                <button type="submit">Ask Chatbot</button>
            </form>

            {% if error %}
                <div class="message error">{{ error }}</div>
            {% endif %}

            {% if answer %}
                <section class="answer-box">
                    <h2>Answer</h2>
                    <p>{{ answer }}</p>
                </section>
            {% else %}
                <section class="answer-box empty">
                    <h2>Answer</h2>
                    <p>Your chatbot answer will appear here.</p>
                </section>
            {% endif %}
        </section>
    </main>
</body>
</html>
